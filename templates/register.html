{% extends "base.html" %}
{% block title %}Register - Pantami Stadium{% endblock %}

{% block content %}
<div class="form-container glass">
    <h2 style="text-align: center; margin-bottom: 2rem;">Create an Account</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; margin-top: 1rem;">Register</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color: var(--primary); text-decoration: none;">Login</a>
    </p>
</div>
{% endblock %}
