{% extends "base.html" %}
{% block title %}Login - Pantami Stadium{% endblock %}

{% block content %}
<div class="form-container glass">
    <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
    <form method="POST" action="">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required autofocus value="admin@stadium.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required value="admin123">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; margin-top: 1rem;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: var(--primary); text-decoration: none;">Register</a>
    </p>
</div>
{% endblock %}
