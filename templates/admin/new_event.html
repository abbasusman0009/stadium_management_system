{% extends "base.html" %}
{% block title %}Create Event - Pantami Stadium{% endblock %}

{% block content %}
<div class="form-container glass" style="max-width: 600px;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Create New Event</h2>
    <form method="POST" action="" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="image">Event Image (Optional)</label>
            <input type="file" id="image" name="image" class="form-control" accept="image/*">
        </div>
        <div class="form-group">
            <label for="date">Event Date and Time</label>
            <input type="datetime-local" id="date" name="date" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" class="form-control" rows="4"></textarea>
        </div>
        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 1;">
                <label for="capacity">Seat Capacity</label>
                <input type="number" id="capacity" name="capacity" class="form-control" min="1" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="price">Ticket Price (₦)</label>
                <input type="number" id="price" name="price" class="form-control" step="0.01" min="0" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; margin-top: 1rem;">Create Event & Generate Seats</button>
    </form>
</div>
{% endblock %}
