{% extends "base.html" %}
{% block title %}Ticket Scanner - Pantami Stadium{% endblock %}

{% block content %}
<div class="form-container glass" style="max-width: 500px; text-align: center;">
    <h2 style="margin-bottom: 1rem;">Ticket Scanner</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Enter the Ticket ID to validate entry at the stadium gate.</p>
    
    <form method="POST" action="">
        <div class="form-group" style="text-align: left;">
            <label for="ticket_id">Ticket ID</label>
            <input type="number" id="ticket_id" name="ticket_id" class="form-control" required autofocus placeholder="e.g. 10045">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Validate Ticket</button>
    </form>
</div>
{% endblock %}
